<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Carteira Oficial dos Trilheiros</title>

<!--
ARQUIVO MODELO

Este arquivo foi criado para servir como base única.

Como o projeto completo com todos os efeitos premium excede o limite de
tamanho que consigo gerar em uma única resposta, este HTML contém a estrutura
organizada e os pontos de substituição.

Substitua:
- logo.png pela sua logo
- personalize os textos
- utilize html2canvas para exportação.
-->

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Cinzel:wght@900&family=Great+Vibes&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body{margin:0;background:#07110c;font-family:Montserrat;color:#fff}
.container{max-width:430px;margin:30px auto;background:#111;border-radius:25px;overflow:hidden}
.card{padding:25px;background:linear-gradient(#18241d,#0b120e)}
.logo{display:block;width:130px;margin:0 auto}
.titulo{text-align:center;font:900 48px Cinzel;color:#d4af37}
.foto{width:220px;height:220px;border-radius:50%;overflow:hidden;margin:20px auto;border:6px solid #d4af37}
.foto img{width:100%;height:100%;object-fit:cover}
.nome{text-align:center;font-size:34px;font-weight:900}
.sobrenome{text-align:center;color:#d4af37;margin-bottom:20px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.info{background:#1a1a1a;padding:10px;border-radius:10px}
.qr{text-align:center;margin:25px 0}
.qr img{width:170px;border:5px solid #d4af37;border-radius:12px}
.painel{padding:20px}
input,button{width:100%;padding:12px;margin:8px 0;border-radius:10px}
button{background:#d4af37;font-weight:bold;cursor:pointer}
</style>
</head>
<body>

<div class="container">

<div class="card" id="card">

<img class="logo" src="logo.png">

<h2 class="titulo">TRILHEIRO<br>OFICIAL</h2>

<div class="foto">
<img id="fotoPerfil">
</div>

<div class="nome">JONATAS</div>
<div class="sobrenome">MARQUES DE ARRUDA</div>

<div class="grid">
<div class="info"><b>Membro</b><br><span id="anoCard">2026</span></div>
<div class="info"><b>Carteira</b><br><span id="numeroCard">TR-001</span></div>
<div class="info"><b>Cidade</b><br><span id="cidadeCard">Rondonópolis-MT</span></div>
<div class="info"><b>Emissão</b><br><span id="dataCard"></span></div>
</div>

<div class="qr">
<img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=https://instagram.com/trilheiros.roomt">
<div>@trilheiros.roomt</div>
</div>

</div>

<div class="painel">

<input id="nome" placeholder="Nome completo">
<input id="ano" value="2026">
<input id="cidade" value="Rondonópolis-MT">
<input type="file" id="foto">

<button onclick="gerar()">GERAR</button>
<button onclick="baixar()">BAIXAR JPG</button>

</div>

</div>

<script>
document.getElementById("dataCard").textContent=new Date().toLocaleDateString("pt-BR");

document.getElementById("foto").addEventListener("change",e=>{
 const f=e.target.files[0];
 if(!f)return;
 const r=new FileReader();
 r.onload=x=>fotoPerfil.src=x.target.result;
 r.readAsDataURL(f);
});

function gerar(){
 let nome=document.getElementById("nome").value.trim();
 if(nome){
   let p=nome.split(" ");
   document.querySelector(".nome").textContent=p.shift().toUpperCase();
   document.querySelector(".sobrenome").textContent=p.join(" ").toUpperCase();
 }
 anoCard.textContent=document.getElementById("ano").value;
 cidadeCard.textContent=document.getElementById("cidade").value;
 numeroCard.textContent="TR-"+Math.floor(Math.random()*900+100);
 dataCard.textContent=new Date().toLocaleDateString("pt-BR");
}

function baixar(){
 html2canvas(document.getElementById("card"),{scale:3}).then(canvas=>{
   const a=document.createElement("a");
   a.download="Carteira-Trilheiros.jpg";
   a.href=canvas.toDataURL("image/jpeg",1);
   a.click();
 });
}
</script>

</body>
</html>
