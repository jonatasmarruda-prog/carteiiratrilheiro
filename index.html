<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Carteira Oficial dos Trilheiros</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800;900&family=Cinzel:wght@700;900&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:
linear-gradient(180deg,#06110b,#0b1d14,#06110b);

font-family:Montserrat,sans-serif;

display:flex;

justify-content:center;

align-items:center;

min-height:100vh;

padding:40px;

}

/* =========================== */

.container{

width:430px;

background:#111;

border-radius:28px;

overflow:hidden;

position:relative;

box-shadow:

0 25px 80px rgba(0,0,0,.75),

0 0 80px rgba(212,175,55,.18);

}

/* =========================== */

.card{

position:relative;

padding:30px;

background:

linear-gradient(180deg,#1a261f,#0d1712);

overflow:hidden;

}

/* textura */

.card::before{

content:"";

position:absolute;

inset:0;

background:

radial-gradient(circle at 20% 20%,rgba(255,255,255,.05),transparent 35%),

radial-gradient(circle at 80% 15%,rgba(212,175,55,.08),transparent 40%),

radial-gradient(circle at 50% 80%,rgba(255,255,255,.04),transparent 40%);

pointer-events:none;

}

/* borda */

.card::after{

content:"";

position:absolute;

left:14px;

top:14px;

right:14px;

bottom:14px;

border-radius:22px;

border:2px solid rgba(212,175,55,.45);

box-shadow:

inset 0 0 20px rgba(255,255,255,.03);

}

/* =========================== */

.logo{

width:130px;

display:block;

margin:auto;

filter:

drop-shadow(0 10px 12px rgba(0,0,0,.7));

position:relative;

z-index:2;

}

/* =========================== */

.topo{

text-align:center;

margin-top:10px;

color:#d4af37;

letter-spacing:4px;

font-size:13px;

font-weight:700;

}

/* =========================== */

.titulo{

margin-top:18px;

text-align:center;

font-family:Cinzel;

font-weight:900;

font-size:66px;

line-height:62px;

background:

linear-gradient(

180deg,

#fff7d1,

#ffe082,

#d4af37,

#8f6a0d);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

text-shadow:

0 3px 0 #705400,

0 6px 0 #4d3800,

0 10px 18px rgba(0,0,0,.65);

position:relative;

z-index:2;

}

/* =========================== */

.foto{

width:250px;

height:250px;

margin:28px auto;

border-radius:50%;

overflow:hidden;

position:relative;

border:7px solid #d4af37;

box-shadow:

0 0 0 4px rgba(255,245,180,.35),

0 0 40px rgba(212,175,55,.8),

0 0 80px rgba(212,175,55,.35);

}

.foto img{

width:100%;

height:100%;

object-fit:cover;

}

/* =========================== */

.nome{

text-align:center;

font-size:48px;

font-weight:900;

color:white;

letter-spacing:2px;

text-shadow:

0 3px 10px black;

}

.sobrenome{

text-align:center;

font-size:24px;

font-weight:700;

color:#d4af37;

margin-bottom:30px;

}

/* =========================== */

.grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:12px;

}

.info{

background:rgba(0,0,0,.45);

border:1px solid rgba(212,175,55,.28);

border-radius:14px;

padding:14px;

backdrop-filter:blur(5px);

}

.info h4{

font-size:12px;

color:#caa53d;

margin-bottom:6px;

letter-spacing:1px;

}

.info p{

font-size:19px;

font-weight:800;

color:white;

}

/* =========================== */

.qr{

margin:35px auto 10px;

width:170px;

height:170px;

background:white;

border-radius:18px;

border:6px solid #d4af37;

display:flex;

align-items:center;

justify-content:center;

box-shadow:

0 0 25px rgba(212,175,55,.4);

}

/* =========================== */

.instagram{

text-align:center;

font-weight:700;

color:white;

margin-top:12px;

}

.assinatura{

margin-top:30px;

font-family:Great Vibes;

font-size:55px;

text-align:center;

color:white;

}

.cargo{

text-align:center;

margin-top:6px;

font-size:13px;

color:#d4af37;

letter-spacing:2px;

font-weight:700;

}

</style>

</head>

<body>

<div class="container">

<div class="card">

<img class="logo"
src="logo.png">

<div class="topo">

MEMBRO OFICIAL • MATO GROSSO

</div>

<div class="titulo">

TRILHEIRO

<br>

OFICIAL

</div>

<div class="foto">

<img id="fotoPerfil">

</div>

<div class="nome">

JONATAS

</div>

<div class="sobrenome">

MARQUES DE ARRUDA

</div>

<div class="grid">

<div class="info">

<h4>🥾 MEMBRO DESDE</h4>

<p>2026</p>

</div>

<div class="info">

<h4>🛡 CARTEIRA</h4>

<p>TR-001</p>

</div>

<div class="info">

<h4>📍 CIDADE</h4>

<p>Rondonópolis-MT</p>

</div>

<div class="info">

<h4>📅 EMISSÃO</h4>

<p>17/07/2026</p>

</div>

</div>

<div class="qr">

QR CODE

</div>

<div class="instagram">

@trilheiros.roomt

</div>

<div class="assinatura">

Jonatas Marruda

</div>

<div class="cargo">

GUIA DE TURISMO • FUNDADOR

</div>

</div>

</div>

</body>
    <!-- ========================================= -->
<!-- FORMULÁRIO PREMIUM -->
<!-- ========================================= -->

<div id="painel" style="padding:30px;background:#0d1712;border-top:2px solid rgba(212,175,55,.25)">

<h2 style="text-align:center;color:#d4af37;margin-bottom:20px;">
PERSONALIZAR CREDENCIAL
</h2>

<div class="campo">

<label>Nome Completo</label>

<input
id="nome"
type="text"
placeholder="Ex: Jonatas Marques de Arruda">

</div>

<div class="campo">

<label>Membro desde</label>

<input
id="ano"
type="number"
value="2026">

</div>

<div class="campo">

<label>Cidade</label>

<input
id="cidade"
type="text"
value="Rondonópolis - MT">

</div>

<div class="campo">

<label>Foto</label>

<input
id="foto"
type="file"
accept="image/*">

</div>

<button id="gerar">

GERAR CREDENCIAL

</button>

</div>

<style>

.campo{

margin-bottom:18px;

}

.campo label{

display:block;

margin-bottom:8px;

color:#d4af37;

font-weight:700;

}

.campo input{

width:100%;

padding:15px;

border-radius:12px;

border:1px solid rgba(212,175,55,.3);

background:#08110d;

color:white;

font-size:15px;

}

#gerar{

width:100%;

padding:18px;

border:none;

cursor:pointer;

border-radius:14px;

margin-top:15px;

font-size:18px;

font-weight:900;

letter-spacing:1px;

background:

linear-gradient(

180deg,

#ffe58c,

#d4af37,

#9a730e);

color:#111;

box-shadow:

0 8px 25px rgba(212,175,55,.35);

transition:.35s;

}

#gerar:hover{

transform:translateY(-3px);

box-shadow:

0 15px 35px rgba(212,175,55,.45);

}

</style>

<script>

const foto=document.getElementById("foto");

const fotoPerfil=document.getElementById("fotoPerfil");

foto.addEventListener("change",function(){

const arq=this.files[0];

if(!arq)return;

const reader=new FileReader();

reader.onload=function(e){

fotoPerfil.src=e.target.result;

}

reader.readAsDataURL(arq);

});

document.getElementById("gerar").onclick=function(){

const nome=document.getElementById("nome").value.trim();

const ano=document.getElementById("ano").value;

const cidade=document.getElementById("cidade").value;

if(nome!=""){

const partes=nome.split(" ");

document.querySelector(".nome").innerHTML=partes[0].toUpperCase();

document.querySelector(".sobrenome").innerHTML=

partes.slice(1).join(" ").toUpperCase();

}

document.querySelectorAll(".info p")[0].innerHTML=ano;

document.querySelectorAll(".info p")[2].innerHTML=cidade;

const numero=

"TR-"+

Math.floor(

100+

Math.random()*900

);

document.querySelectorAll(".info p")[1].innerHTML=numero;

const hoje=new Date();

const data=

String(hoje.getDate()).padStart(2,"0")+"/"

+

String(hoje.getMonth()+1).padStart(2,"0")+"/"

+

hoje.getFullYear();

document.querySelectorAll(".info p")[3].innerHTML=data;

}

</script>

</html>
