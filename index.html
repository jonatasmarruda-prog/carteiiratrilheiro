<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carteira Oficial | Trilheiros de Rondonópolis</title>
    
    <!-- Meta Tags SEO -->
    <meta name="description" content="Gere sua carteira oficial personalizada dos Trilheiros de Rondonópolis.">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- CropperJS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    
    <!-- Stylesheet -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <div class="logo-wrapper">
            <img src="https://i.postimg.cc/JnF2F9Hw/LOGO-TRILHEIROS-Photoroom.png" alt="Logo Oficial" class="logo-principal">
        </div>
        <h1>CARTEIRA OFICIAL<br><span>DOS</span><br>TRILHEIROS DE RONDONÓPOLIS</h1>
        <p>Crie gratuitamente sua Carteira Oficial personalizada e compartilhe sua aventura.</p>
    </header>

    <main id="app">
        <!-- Formulário Premium -->
        <section id="form-section" class="premium-card">
            <div class="form-group">
                <label for="imageInput">📷 Foto do Trilheiro</label>
                <p class="legend">Escolha uma foto onde seu rosto esteja totalmente visível.</p>
                <input type="file" id="imageInput" accept="image/*">
                <div id="cropper-container">
                    <img id="imagePreview" alt="Pré-visualização">
                </div>
            </div>

            <div class="form-group">
                <label for="nomeInput">👤 Nome Completo</label>
                <input type="text" id="nomeInput" placeholder="Digite seu nome completo">
            </div>

            <div class="form-group">
                <label for="anoInput">🥾 Trilheiro desde</label>
                <input type="number" id="anoInput" placeholder="Ex: 2026">
            </div>

            <div class="form-group">
                <label for="cidadeInput">📍 Cidade</label>
                <input type="text" id="cidadeInput" placeholder="Ex: Rondonópolis - MT">
            </div>

            <button id="btnGerar" class="btn-premium">GERAR CARTEIRA OFICIAL</button>
        </section>

        <!-- Tela Final -->
        <section id="result-section" class="hidden">
            <h2>Sua Carteira Oficial está pronta.</h2>
            <div id="carteira-container" class="carteira-stories">
                <!-- O JavaScript irá gerar o conteúdo da carteira aqui -->
            </div>
            <div class="actions">
                <button id="btnBaixar" class="btn-premium">BAIXAR STORIES</button>
                <button id="btnNova" class="btn-premium secondary">GERAR NOVA CARTEIRA</button>
            </div>
        </section>
    </main>

    <footer>
        <p>Comunidade Oficial dos Trilheiros de Rondonópolis.</p>
    </footer>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
