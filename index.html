<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credencial VIP - Trilheiros de Rondonópolis</title>
    <!-- Fontes Premium -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #050a07 0%, #111a14 100%);
            color: #ffffff;
            text-align: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 420px;
            background: rgba(20, 25, 22, 0.75);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px 30px;
            border-radius: 24px;
            border: 1px solid rgba(212, 175, 55, 0.25);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(212, 175, 55, 0.05);
            box-sizing: border-box;
        }
        .logo-form {
            width: 130px;
            margin: 0 auto 20px auto;
            display: block;
            filter: drop-shadow(0px 10px 15px rgba(0,0,0,0.6));
        }
        h1 { 
            color: #d4af37;
            font-weight: 900;
            font-size: 26px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        p {
            color: #b3b3b3;
            font-size: 13px;
            margin-bottom: 35px;
        }
        .input-group {
            text-align: left;
            margin-bottom: 22px;
        }
        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #d4af37;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.4);
            color: white;
            box-sizing: border-box;
            font-size: 15px;
            font-family: 'Montserrat', sans-serif;
            transition: 0.3s;
        }
        input[type="text"]:focus {
            border-color: #d4af37;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
            outline: none;
        }
        input[type="file"]::file-selector-button {
            background: linear-gradient(135deg, #333, #222);
            color: #d4af37;
            border: 1px solid rgba(212, 175, 55, 0.5);
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            margin-right: 15px;
            font-weight: 600;
        }
        button {
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        #gerarBtn {
            background: linear-gradient(135deg, #d4af37 0%, #aa8529 100%);
            color: #0a0a0a;
            padding: 18px 20px;
            width: 100%;
            font-size: 16px;
            margin-top: 15px;
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.3);
        }
        #gerarBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(212, 175, 55, 0.5);
        }
        #action-buttons {
            display: none; 
            gap: 15px;
            margin-top: 25px;
            width: 100%;
        }
        #action-buttons button {
            flex: 1; 
            padding: 16px 10px;
            font-size: 13px; 
        }
        #downloadBtn {
            background: linear-gradient(135deg, #2e7d32, #1b5e20);
            color: white;
            box-shadow: 0 8px 20px rgba(46, 125, 50, 0.3);
        }
        #downloadBtn:hover {
            box-shadow: 0 12px 25px rgba(46, 125, 50, 0.5);
            transform: translateY(-2px);
        }
        #voltarBtn {
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        #voltarBtn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }
        #canvas-container {
            margin-top: 20px;
            width: 100%;
            display: none;
        }
        canvas {
            width: 100%;
            max-width: 340px;
            border-radius: 16px;
            border: 2px solid rgba(212, 175, 55, 0.6);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://i.postimg.cc/JnF2F9Hw/LOGO-TRILHEIROS-Photoroom.png" alt="Logo Trilheiros" class="logo-form">
    
    <h1>CREDENCIAL VIP</h1>
    
    <div id="form-container">
        <p>Preencha os dados do trilheiro abaixo</p>

        <div class="input-group">
            <label>Nome do Trilheiro</label>
            <input type="text" id="nomeInput" placeholder="Ex: Carlos Silva" maxlength="18">
        </div>

        <div class="input-group">
            <label>Membro Desde (Ano)</label>
            <input type="text" id="anoInput" placeholder="Ex: 2026" maxlength="4">
        </div>

        <div class="input-group">
            <label>Cidade - Estado</label>
            <input type="text" id="cidadeInput" placeholder="Ex: Rondonópolis - MT" maxlength="25">
        </div>
        
        <div class="input-group">
            <label>Foto de Perfil</label>
            <input type="file" id="fotoInput" accept="image/*">
        </div>

        <button id="gerarBtn" onclick="gerarCracha()">1. Forjar Credencial 3D</button>
    </div>

    <div id="canvas-container">
        <canvas id="crachaCanvas" width="1080" height="1920"></canvas>
    </div>

    <div id="action-buttons">
        <button id="downloadBtn" onclick="baixarCracha()">Baixar Arte</button>
        <button id="voltarBtn" onclick="voltarInicio()">Voltar ao Início</button>
    </div>
</div>

<script>
    async function carregarImagem(url) {
        return new Promise((resolve) => {
            const img = new Image();
            img.crossOrigin = "anonymous"; 
            img.onload = () => resolve(img);
            img.onerror = () => resolve(null);
            img.src = url;
        });
    }

    document.fonts.load("90px 'Great Vibes'").then(function() {
        console.log('Fonte cursiva carregada');
    });

    async function gerarCracha() {
        const btn = document.getElementById('gerarBtn');
        btn.innerText = "Forjando Arte Premium...";
        
        try {
            const canvas = document.getElementById('crachaCanvas');
            const ctx = canvas.getContext('2d');
            
            const nome = document.getElementById('nomeInput').value || 'TRILHEIRO';
            const ano = document.getElementById('anoInput').value || '2026';
            const cidade = document.getElementById('cidadeInput').value || 'Rondonópolis - MT';
            const fotoInput = document.getElementById('fotoInput').files[0];

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. FUNDO COM EFEITO VINHETA CINEMATOGRÁFICA
            const bgImg = await carregarImagem('fundo.jpg');
            if (bgImg) {
                ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = '#0a140e';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
            
            // Efeito Vinheta (Escurece as bordas)
            const vinheta = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 200, canvas.width/2, canvas.height/2, 1200);
            vinheta.addColorStop(0, 'rgba(0,0,0,0)');
            vinheta.addColorStop(1, 'rgba(0,0,0,0.85)');
            ctx.fillStyle = vinheta;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 2. LOGO NO TOPO
            const logoImg = await carregarImagem('logo.png');
            if (logoImg) {
                const logoWidth = 280;
                const logoHeight = (logoImg.height / logoImg.width) * logoWidth;
                ctx.drawImage(logoImg, (canvas.width / 2) - (logoWidth / 2), 70, logoWidth, logoHeight);
            }

            // 3. TÍTULO: METALIZADO 3D
            ctx.textAlign = "center";
            ctx.font = "900 80px 'Montserrat', sans-serif";
            ctx.shadowColor = "rgba(0, 0, 0, 0.95)";
            ctx.shadowBlur = 20;
            ctx.shadowOffsetY = 10;
            
            const gradText = ctx.createLinearGradient(0, 300, 0, 480);
            gradText.addColorStop(0, '#fff5c0'); // Luz alta do sol
            gradText.addColorStop(0.3, '#d4af37'); // Ouro base
            gradText.addColorStop(0.6, '#8a660d'); // Sombra do metal
            gradText.addColorStop(0.8, '#d4af37'); // Reflexo
            gradText.addColorStop(1, '#523a01'); // Base escura
            ctx.fillStyle = gradText;
            
            ctx.fillText("TRILHEIRO", canvas.width / 2, 370);
            ctx.fillText("OFICIAL", canvas.width / 2, 460);
            ctx.shadowColor = "transparent";

            // 4. FOTO DE PERFIL COM BORDA DUPLA E GLOW
            if (fotoInput) {
                const imgUrl = URL.createObjectURL(fotoInput);
                const userImg = await carregarImagem(imgUrl);
                
                if (userImg) {
                    const centerX = canvas.width / 2;
                    const centerY = 780; 
                    const radius = 240; 

                    // Efeito Glow Neon Dourado atrás da foto
                    ctx.beginPath();
                    ctx.arc(centerX, centerY, radius + 15, 0, Math.PI * 2, true);
                    ctx.shadowColor = "rgba(212, 175, 55, 0.8)";
                    ctx.shadowBlur = 40;
                    ctx.fillStyle = "#000";
                    ctx.fill();
                    ctx.shadowColor = "transparent";

                    // Recorte e desenho da foto
                    ctx.save();
                    ctx.beginPath();
                    ctx.arc(centerX, centerY, radius, 0, Math.PI * 2, true);
                    ctx.closePath();
                    ctx.clip();
                    ctx.drawImage(userImg, centerX - radius, centerY - radius, radius * 2, radius * 2);
                    ctx.restore();
                    
                    // Anel Externo Grosso
                    ctx.beginPath();
                    ctx.arc(centerX, centerY, radius + 10, 0, Math.PI * 2, true);
                    ctx.lineWidth = 8;
                    ctx.strokeStyle = "#d4af37";
                    ctx.stroke();

                    // Anel Interno Fino colado na foto
                    ctx.beginPath();
                    ctx.arc(centerX, centerY, radius, 0, Math.PI * 2, true);
                    ctx.lineWidth = 4;
                    ctx.strokeStyle = "#ffe270";
                    ctx.stroke();
                }
            }

            // 5. NOME DO USUÁRIO 3D
            ctx.font = "900 100px 'Montserrat', sans-serif";
            ctx.shadowColor = "rgba(0, 0, 0, 0.9)";
            ctx.shadowBlur = 15;
            ctx.shadowOffsetY = 6;
            ctx.fillStyle = "#FFFFFF"; 
            
            const primeiroNome = nome.split(' ')[0];
            ctx.fillText(primeiroNome.toUpperCase(), canvas.width / 2, 1170);
            ctx.shadowColor = "transparent";

            // 6. CAIXA DE INFORMAÇÕES COM MARCA D'ÁGUA
            ctx.fillStyle = "rgba(10, 15, 12, 0.85)";
            ctx.strokeStyle = "rgba(212, 175, 55, 0.4)";
            ctx.lineWidth = 2;
            
            const boxX = (canvas.width/2) - 420;
            const boxY = 1220;
            const boxW = 840;
            const boxH = 170;
            
            ctx.beginPath();
            ctx.roundRect(boxX, boxY, boxW, boxH, 25);
            ctx.fill();
            ctx.stroke();

            // Marca d'água da logo dentro da caixa
            if (logoImg) {
                ctx.globalAlpha = 0.06; // Quase transparente
                ctx.drawImage(logoImg, boxX + 250, boxY - 50, 350, 350);
                ctx.globalAlpha = 1.0; // Restaura a opacidade normal
            }

            ctx.font = "800 32px 'Montserrat', Arial";
            ctx.textAlign = "right";
            ctx.fillStyle = "#d4af37";
            ctx.fillText("Membro Desde:", (canvas.width/2) - 30, 1280);
            ctx.fillText("Expedição:", (canvas.width/2) - 30, 1345);

            ctx.textAlign = "left";
            ctx.fillStyle = "#FFFFFF";
            ctx.fillText(ano, (canvas.width/2) + 10, 1280);
            ctx.fillText(cidade.toUpperCase(), (canvas.width/2) + 10, 1345);

            // 7. QR CODE GERADO AUTOMATICAMENTE VIA API (Instagram Oficial)
            // Não precisa mais do arquivo qr.png no GitHub!
            const qrUrl = "https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://instagram.com/trilheiros.roomt&margin=2";
            const qrImg = await carregarImagem(qrUrl);
            
            const alturaQR = 1440;
            const tamanhoQR = 230;
            
            if (qrImg) {
                ctx.drawImage(qrImg, (canvas.width / 2) - (tamanhoQR/2), alturaQR, tamanhoQR, tamanhoQR);
                // Borda do QR Code
                ctx.lineWidth = 5;
                ctx.strokeStyle = "#d4af37";
                ctx.strokeRect((canvas.width / 2) - (tamanhoQR/2), alturaQR, tamanhoQR, tamanhoQR);
            }

            ctx.textAlign = "center";
            ctx.font = "800 42px 'Montserrat'";
            ctx.fillStyle = "#FFFFFF";
            ctx.letterSpacing = "2px";
            ctx.fillText("@trilheiros.roomt", canvas.width / 2, alturaQR + tamanhoQR + 60);
            ctx.letterSpacing = "0px";

            // 8. ASSINATURA OFICIAL DO GUIA
            ctx.font = "400 110px 'Great Vibes', cursive";
            ctx.fillStyle = "#FFFFFF";
            ctx.fillText("Jonatas Marruda", canvas.width / 2, 1820);

            ctx.font = "800 24px 'Montserrat', sans-serif";
            ctx.fillStyle = "#d4af37";
            ctx.letterSpacing = "4px";
            ctx.fillText("GUIA DE TURISMO", canvas.width / 2, 1870);
            ctx.letterSpacing = "0px";

            // Troca de telas
            document.getElementById('form-container').style.display = 'none';
            document.getElementById('canvas-container').style.display = 'block';
            document.getElementById('action-buttons').style.display = 'flex';

        } catch (erro) {
            alert("Erro ao processar: " + erro.message);
        } finally {
            btn.innerText = "1. Forjar Credencial 3D";
        }
    }

    function voltarInicio() {
        document.getElementById('canvas-container').style.display = 'none';
        document.getElementById('action-buttons').style.display = 'none';
        
        document.getElementById('nomeInput').value = '';
        document.getElementById('anoInput').value = '';
        document.getElementById('cidadeInput').value = '';
        document.getElementById('fotoInput').value = '';
        
        document.getElementById('form-container').style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function baixarCracha() {
        const canvas = document.getElementById('crachaCanvas');
        const link = document.createElement('a');
        link.download = 'credencial-vip-trilheiros.jpg';
        link.href = canvas.toDataURL("image/jpeg", 1.0); 
        link.click();
    }
</script>

</body>
</html>
