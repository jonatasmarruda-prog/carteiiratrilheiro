<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Credencial VIP Trilheiros</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Great+Vibes&display=swap');

        body { background: #050505; color: #fff; font-family: 'Montserrat', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .app-container { width: 100%; max-width: 400px; }

        /* DESIGN DO TÍTULO 3D PREMIUM */
        .titulo-3d {
            font-size: 45px; line-height: 0.9; font-weight: 900; text-align: center;
            background: linear-gradient(180deg, #fff 0%, #d1d1d1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 0 #888, 0 8px 10px rgba(0,0,0,0.5);
            margin: 15px 0;
        }

        /* MOLDURA FOTO */
        .foto-container { 
            width: 220px; height: 220px; border-radius: 20px; 
            border: 6px solid #d4af37; overflow: hidden;
            box-shadow: 0 0 30px rgba(212,175,55,0.4), inset 0 0 10px #000;
        }

        /* CARD FINAL */
        #cardExport { 
            width: 100%; aspect-ratio: 9/16; background-size: cover; 
            border: 8px solid #d4af37; border-radius: 25px; overflow: hidden; 
            background-image: url('https://i.postimg.cc/3JZfRnNr/file-0000000010fc720e8b2d698d8b712aad.png');
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- ÁREA DO FORMULÁRIO -->
        <div id="form-section" style="background:#111; padding:25px; border-radius:20px; border:1px solid #d4af37;">
            <input type="text" id="nome" placeholder="NOME COMPLETO" style="width:100%; padding:15px; margin-bottom:10px;">
            <input type="file" id="inputFoto" accept="image/*">
            <div id="cropperArea" style="display:none; margin:15px 0;">
                <img id="imageToCrop" style="max-width:100%;">
                <button onclick="cortar()" style="width:100%; padding:10px; background:#d4af37;">CONFIRMAR CORTE</button>
            </div>
            <button onclick="gerar()" style="width:100%; padding:20px; background:#d4af37; font-weight:900; font-size:16px;">GERAR CREDENCIAL</button>
        </div>

        <!-- RESULTADO MASTER -->
        <div id="result-section" style="display:none;">
            <div id="cardExport">
                <div style="width:100%; height:100%; background:rgba(0,0,0,0.45); display:flex; flex-direction:column; align-items:center; padding:30px; box-sizing:border-box;">
                    <img src="https://i.postimg.cc/JnF2F9Hw/LOGO-TRILHEIROS-Photoroom.png" width="140" style="filter:drop-shadow(0 0 10px #d4af37);">
                    <div class="titulo-3d">TRILHEIRO<br><span style="color:#d4af37;">OFICIAL</span></div>
                    <div class="foto-container" id="fotoFinal"></div>
                    <div id="nomeRender" style="font-size:36px; font-weight:900; margin-top:15px;"></div>
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://instagram.com/trilheiros.roomt" width="100" style="border:4px solid #d4af37; border-radius:10px; margin-top:15px;">
                </div>
            </div>
        </div>
    </div>

    <script>
        let cropper;
        document.getElementById('inputFoto').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = document.getElementById('imageToCrop');
                img.src = event.target.result;
                document.getElementById('cropperArea').style.display = 'block';
                if(cropper) cropper.destroy();
                cropper = new Cropper(img, { aspectRatio: 1, viewMode: 1 });
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        function cortar() {
            const canvas = cropper.getCroppedCanvas();
            document.getElementById('fotoFinal').innerHTML = '';
            document.getElementById('fotoFinal').appendChild(canvas);
            document.getElementById('cropperArea').style.display = 'none';
        }

        function gerar() {
            document.getElementById("nomeRender").textContent = document.getElementById("nome").value.toUpperCase();
            document.getElementById("form-section").style.display = "none";
            document.getElementById("result-section").style.display = "block";
        }
    </script>
</body>
</html>
